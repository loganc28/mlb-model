name: Daily MLB Picks

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_picks.py

      - name: Commit and push output
        run: |
          git config --global user.name "mlb-model-bot"
          git config --global user.email "bot@mlbmodel.local"
          git fetch origin
          git reset --hard origin/main
          git add output/
          git diff --staged --quiet || git commit -m "picks: $(date +%Y-%m-%d)"
          git push
