name: Daily MLB Picks

on:
  schedule:
    - cron: '0 11 * * *'   # 7AM ET
    - cron: '0 19 * * *'   # 3PM ET
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate picks (yes/no)'
        required: false
        default: 'no'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run picks generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || 'no' }}
        run: python generate_picks.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: update picks $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
