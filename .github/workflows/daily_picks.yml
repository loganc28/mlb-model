name: Daily MLB Picks

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate picks? (yes/no)'
        required: false
        default: 'no'

env:
  FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate || 'no' }}

jobs:
  generate-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FORCE_REGENERATE: ${{ env.FORCE_REGENERATE }}
        run: python generate_picks.py

      - name: Commit and push output
        run: |
          git config --global user.name "mlb-model-bot"
          git config --global user.email "bot@mlbmodel.local"
          git add output/
          git diff --staged --quiet || git commit -m "picks: $(date +%Y-%m-%d)"
          git push
