<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MLB Live Scores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F11;--surface:#151719;--surface2:#1C1F22;--border:#272B2F;
  --text:#F0F2F4;--muted:#8A9099;--faint:#3A3F45;
  --gold:#F5C842;--green:#22C87A;--red:#F04B4B;--blue:#4B9CF5;--purple:#9B72F5;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);padding:1.5rem 1rem;max-width:760px;margin:0 auto}
.brand{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.page-title{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.meta{font-size:12px;color:var(--muted);margin-bottom:1.5rem;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.meta a{color:var(--blue);text-decoration:none;font-weight:500}
.divider{color:var(--faint)}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;font-family:"DM Sans",sans-serif}
.refresh-btn:hover{color:var(--text)}

.status-bar{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;font-family:"DM Mono",monospace}
.pill.live{background:#F04B4B18;color:var(--red);border:1px solid #F04B4B30;animation:blink 2s infinite}
.pill.final{background:#8A909918;color:var(--muted);border:1px solid #8A909930}
.pill.upcoming{background:#4B9CF518;color:var(--blue);border:1px solid #4B9CF530}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:1.25rem 0 .6rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:"";flex:1;height:1px;background:var(--border)}

.games{display:flex;flex-direction:column;gap:8px}

/* Game card */
.gc{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.gc.pick{border-color:#F5C84240}
.gc.pick .gc-top{border-left:3px solid var(--gold)}
.gc.is-live{border-color:#F04B4B25}
.gc.is-live .gc-top{border-left:3px solid var(--red)}

/* Top row — always visible */
.gc-top{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px}
.gc-top:hover{background:var(--surface2)}
.team-away{flex:1;min-width:0}
.team-home{flex:1;min-width:0;text-align:right}
.tn{font-size:15px;font-weight:700;font-family:"Syne",sans-serif;letter-spacing:-.01em}
.sp{font-size:10px;color:var(--muted);margin-top:1px}
.center-col{flex:0 0 120px;text-align:center}
.score-row{display:flex;align-items:center;justify-content:center;gap:8px;font-family:"Syne",sans-serif;font-size:22px;font-weight:800;line-height:1}
.sc{min-width:24px}
.sc.dim{color:var(--muted)}
.score-sep{color:var(--faint);font-size:16px;font-weight:400}
.game-info{font-size:10px;color:var(--muted);margin-top:3px;font-family:"DM Mono",monospace}
.game-info.live{color:var(--red)}
.game-info.upcoming{color:var(--blue)}
.expand-arrow{font-size:10px;color:var(--faint);flex-shrink:0;transition:transform .2s;margin-left:4px}
.gc.open .expand-arrow{transform:rotate(180deg)}

/* Pick banner */
.pick-banner{background:#F5C84210;border-top:1px solid #F5C84225;padding:6px 14px;font-size:11px;display:flex;gap:8px;align-items:center}
.pick-tier{font-family:"DM Mono",monospace;font-weight:700;color:var(--gold)}
.pick-desc{color:var(--text)}
.pick-line{color:var(--muted);font-family:"DM Mono",monospace}
.pick-units{color:var(--gold);font-family:"DM Mono",monospace}

/* Expandable section */
.gc-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
.gc.open .gc-body{max-height:500px}

/* Line score */
.ls-wrap{padding:10px 14px 0}
.ls-table{width:100%;border-collapse:collapse;font-family:"DM Mono",monospace;font-size:11px;margin-bottom:10px}
.ls-table th{color:var(--muted);text-align:center;padding:3px 4px;border-bottom:1px solid var(--border);font-weight:500;min-width:20px}
.ls-table th.t-name{text-align:left;min-width:40px}
.ls-table td{text-align:center;padding:3px 4px}
.ls-table td.t-name{text-align:left;color:var(--muted)}
.ls-table td.cur{background:var(--surface2);color:var(--gold)}
.ls-table .sep{border-left:1px solid var(--border)}

/* PBP */
.pbp-bar{padding:0 14px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
.pbp-bar:hover .pbp-label{color:var(--text)}
.toggle{width:30px;height:17px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:#22C87A30;border-color:#22C87A50}
.toggle::after{content:"";position:absolute;width:11px;height:11px;background:var(--faint);border-radius:50%;top:2px;left:2px;transition:all .2s}
.toggle.on::after{background:var(--green);left:15px}
.pbp-label{font-size:11px;color:var(--muted);transition:color .15s}
.pbp-list{max-height:0;overflow:hidden;transition:max-height .25s ease;padding:0 14px}
.pbp-list.on{max-height:280px;overflow-y:auto;padding-bottom:10px}
.pbp-item{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px}
.pbp-item:last-child{border:none}
.pbp-inn{font-family:"DM Mono",monospace;color:var(--muted);width:32px;flex-shrink:0}
.pbp-txt{color:var(--text);opacity:.8;flex:1;line-height:1.4}
.pbp-sc{font-family:"DM Mono",monospace;color:var(--green);width:44px;text-align:right;flex-shrink:0}
.pbp-empty{color:var(--faint);font-size:11px;padding:8px 0;font-style:italic}
.pbp-list::-webkit-scrollbar{width:3px}
.pbp-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.loading{text-align:center;padding:3rem;color:var(--muted)}
footer{font-size:11px;color:var(--faint);margin-top:2rem;text-align:center;padding-bottom:2rem}
</style>
</head>
<body>
<div class="brand">MLB Betting Model</div>
<div class="page-title">Live Scores</div>
<div class="meta">
  <span id="date-lbl"></span>
  <span class="divider">&middot;</span>
  <a href="index.html">Today's picks</a>
  <span class="divider">&middot;</span>
  <a href="record.html">Record</a>
  <span class="divider">&middot;</span>
  <span id="last_upd" style="color:var(--muted)">Loading...</span>
  <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
</div>
<div class="status-bar" id="sb"></div>
<div id="container"><div class="loading">Loading scores...</div></div>
<footer>Live data from MLB Stats API &middot; Auto-refreshes every 30 seconds</footer>

<script>
var PICKS = {};

var ABBR = {
  'New York Yankees':'NYY','New York Mets':'NYM','Boston Red Sox':'BOS',
  'Tampa Bay Rays':'TB','Baltimore Orioles':'BAL','Toronto Blue Jays':'TOR',
  'Chicago White Sox':'CWS','Cleveland Guardians':'CLE','Detroit Tigers':'DET',
  'Kansas City Royals':'KC','Minnesota Twins':'MIN','Houston Astros':'HOU',
  'Los Angeles Angels':'LAA','Oakland Athletics':'OAK','Athletics':'ATH',
  'Seattle Mariners':'SEA','Texas Rangers':'TEX','Atlanta Braves':'ATL',
  'Miami Marlins':'MIA','Philadelphia Phillies':'PHI','Washington Nationals':'WSH',
  'Chicago Cubs':'CHC','Cincinnati Reds':'CIN','Milwaukee Brewers':'MIL',
  'Pittsburgh Pirates':'PIT','St. Louis Cardinals':'STL','Arizona Diamondbacks':'ARI',
  'Colorado Rockies':'COL','Los Angeles Dodgers':'LAD','San Diego Padres':'SD',
  'San Francisco Giants':'SF'
};

function abbr(n){return ABBR[n]||(n.split(' ').pop().substring(0,3).toUpperCase())}

function toET(iso){
  if(!iso)return'';
  try{return new Date(iso).toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'})+' ET';}
  catch(e){return'';}
}

function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}

async function loadPicks(){
  try{
    var r=await fetch('picks.json');
    if(!r.ok)return;
    var d=await r.json();
    (d.picks||[]).forEach(p=>{
      if(p.tier&&p.tier!=='SKIP'&&p.tier!=='WATCH'){
        PICKS[p.game]={pick:p.pick.replace(/\(WATCH\)/,'').trim(),tier:p.tier,line:p.line,units:p.units};
      }
    });
  }catch(e){}
}

function findPick(away,home){
  return PICKS[away+' @ '+home]||PICKS[home+' @ '+away]||null;
}

async function refresh(){
  var d=today();
  document.getElementById('date-lbl').textContent=d;
  try{
    var r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+d+'&hydrate=linescore,team,probablePitcher');
    var data=await r.json();
    var games=[];
    (data.dates||[]).forEach(dt=>dt.games.forEach(g=>games.push(g)));
    render(games);
    var now=new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'});
    document.getElementById('last_upd').textContent='Updated '+now+' ET';
  }catch(e){
    document.getElementById('container').innerHTML='<div class="loading" style="color:var(--red)">Failed to load. Try refreshing.</div>';
  }
}

function render(games){
  var live=[],final=[],upcoming=[];
  games.forEach(g=>{
    var s=g.status.abstractGameState;
    if(s==='Live')live.push(g);
    else if(s==='Final')final.push(g);
    else upcoming.push(g);
  });

  // Status bar
  var sb='';
  if(live.length)sb+='<span class="pill live">&#9679; '+live.length+' Live</span>';
  if(final.length)sb+='<span class="pill final">'+final.length+' Final</span>';
  if(upcoming.length)sb+='<span class="pill upcoming">'+upcoming.length+' Upcoming</span>';
  document.getElementById('sb').innerHTML=sb;

  var html='<div class="games">';
  if(live.length){html+='<div class="section-label">Live Now</div>';live.forEach(g=>html+=card(g));}
  if(upcoming.length){html+='<div class="section-label">Upcoming</div>';upcoming.forEach(g=>html+=card(g));}
  if(final.length){html+='<div class="section-label">Final</div>';final.forEach(g=>html+=card(g));}
  html+='</div>';
  document.getElementById('container').innerHTML=html;

  // Attach card expand listeners
  document.querySelectorAll('.gc-top').forEach(el=>{
    el.addEventListener('click',function(){
      var gc=this.closest('.gc');
      gc.classList.toggle('open');
      // Load PBP data on first open
      var pbpList=gc.querySelector('.pbp-list');
      if(gc.classList.contains('open')&&pbpList&&pbpList.dataset.loaded!=='1'){
        loadPBP(gc.dataset.gid,pbpList);
      }
    });
  });

  // PBP toggle — separate from card expand
  document.querySelectorAll('.pbp-bar').forEach(el=>{
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var tog=this.querySelector('.toggle');
      var list=this.nextElementSibling;
      tog.classList.toggle('on');
      list.classList.toggle('on');
    });
  });
}

function card(g){
  var away=g.teams.away.team.name;
  var home=g.teams.home.team.name;
  var aScore=g.teams.away.score;
  var hScore=g.teams.home.score;
  var ls=g.linescore||{};
  var innings=ls.innings||[];
  var curInn=ls.currentInning||0;
  var innOrd=ls.currentInningOrdinal||'';
  var isTop=ls.isTopInning;
  var state=g.status.abstractGameState;
  var gid=g.gamePk;

  var awayP=(g.teams.away.probablePitcher||{}).fullName||'TBD';
  var homeP=(g.teams.home.probablePitcher||{}).fullName||'TBD';
  awayP=awayP.split(' ').pop();
  homeP=homeP.split(' ').pop();

  var pick=findPick(away,home);
  var isLive=state==='Live';
  var isFinal=state==='Final';
  var hasScore=aScore!==undefined&&aScore!==null;

  // Game info line
  var infoTxt='',infoCls='game-info';
  if(isLive){infoTxt=(isTop?'▲':'▼')+' '+innOrd;infoCls+=' live';}
  else if(isFinal){
    var extra=innings.length>9?'/'+innings.length:'';
    infoTxt='Final'+extra;
  }
  else{infoTxt='⏱ '+toET(g.gameDate);infoCls+=' upcoming';}

  // Score display
  var scorePart='';
  if(hasScore){
    var aWin=aScore>hScore,hWin=hScore>aScore;
    scorePart=`<div class="score-row">
      <span class="sc${(isFinal&&!aWin)?' dim':''}">${aScore}</span>
      <span class="score-sep">:</span>
      <span class="sc${(isFinal&&!hWin)?' dim':''}">${hScore}</span>
    </div>`;
  }else{
    scorePart='<div style="font-size:12px;color:var(--faint);font-family:\'DM Mono\',monospace">vs</div>';
  }

  // Pick banner
  var pickBanner='';
  if(pick){
    pickBanner=`<div class="pick-banner">
      <span class="pick-tier">${pick.tier}</span>
      <span class="pick-desc">${pick.pick}</span>
      <span class="pick-line">${pick.line}</span>
      <span class="pick-units">${pick.units}u</span>
    </div>`;
  }

  // Line score table
  var lsHtml=buildLS(innings,away,home,aScore,hScore,curInn,state);

  // PBP section (only for started games)
  var pbpSection='';
  if(state!=='Preview'&&state!=='Scheduled'&&state!=='Pre-Game'){
    pbpSection=`
      <div class="pbp-bar">
        <div class="toggle"></div>
        <span class="pbp-label">Play by play</span>
      </div>
      <div class="pbp-list" data-loaded="0"></div>`;
  }

  return `<div class="gc${pick?' pick':''}${isLive?' is-live':''}" data-gid="${gid}">
  <div class="gc-top">
    <div class="team-away">
      <div class="tn">${abbr(away)}</div>
      <div class="sp">${awayP}</div>
    </div>
    <div class="center-col">
      ${scorePart}
      <div class="${infoCls}">${infoTxt}</div>
    </div>
    <div class="team-home">
      <div class="tn">${abbr(home)}</div>
      <div class="sp">${homeP}</div>
    </div>
    <span class="expand-arrow">▾</span>
  </div>
  ${pickBanner}
  <div class="gc-body">
    <div class="ls-wrap">${lsHtml}</div>
    ${pbpSection}
  </div>
</div>`;
}

function buildLS(innings,away,home,aTotal,hTotal,curInn,state){
  if(!innings.length&&state!=='Live'&&state!=='Final'){return '<div style="padding:8px 0;font-size:11px;color:var(--faint)">Game not started</div>';}
  var max=Math.max(9,innings.length);
  var hdr='<th class="t-name">Team</th>';
  for(var i=1;i<=max;i++)hdr+=`<th class="${i===curInn?'cur':''}">${i}</th>`;
  hdr+='<th class="sep">R</th>';

  function row(side,name,total){
    var cells='<td class="t-name">'+abbr(name)+'</td>';
    for(var i=1;i<=max;i++){
      var inn=innings[i-1];
      var v=inn?(inn[side]!==undefined?(inn[side].runs!==undefined?inn[side].runs:''):' '):' ';
      cells+=`<td class="${i===curInn?'cur':''}">${v!==undefined&&v!==''?v:''}</td>`;
    }
    cells+=`<td class="sep" style="font-weight:600">${total!==undefined?total:''}</td>`;
    return`<tr>${cells}</tr>`;
  }

  return`<table class="ls-table">
    <thead><tr>${hdr}</tr></thead>
    <tbody>${row('away',away,aTotal)}${row('home',home,hTotal)}</tbody>
  </table>`;
}

async function loadPBP(gid,container){
  container.dataset.loaded='1';
  container.innerHTML='<div class="pbp-empty">Loading...</div>';
  try{
    var r=await fetch('https://statsapi.mlb.com/api/v1/game/'+gid+'/playByPlay');
    var d=await r.json();
    var plays=(d.allPlays||[]).filter(p=>p.result&&p.result.description);
    if(!plays.length){container.innerHTML='<div class="pbp-empty">No plays yet.</div>';return;}
    var recent=plays.slice(-30).reverse();
    var html='';
    recent.forEach(p=>{
      var a=p.about||{};
      var inn=(a.isTopInning?'▲':'▼')+(a.inning||'');
      var desc=p.result.description||'';
      var sc=p.result.awayScore!==undefined?(p.result.awayScore+'-'+p.result.homeScore):'';
      html+=`<div class="pbp-item"><span class="pbp-inn">${inn}</span><span class="pbp-txt">${desc}</span>${sc?'<span class="pbp-sc">'+sc+'</span>':''}</div>`;
    });
    container.innerHTML=html;
  }catch(e){container.innerHTML='<div class="pbp-empty">Could not load plays.</div>';}
}

async function init(){
  await loadPicks();
  await refresh();
  setInterval(refresh,30000);
}
init();
</script>
</body>
</html>
