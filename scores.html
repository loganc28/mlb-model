<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MLB Live Scores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0C0F;--surface:#111418;--surface2:#181C22;--surface3:#1E2330;
  --border:#1A1F2A;--border2:#222836;
  --text:#F0F4F8;--muted:#5C6880;--faint:#1E2330;--subtle:#8A95A8;
  --gold:#F5C842;--green:#22D47A;--red:#F04D5A;--blue:#4B9EF5;
  --radius:14px;--radius-sm:8px;--radius-xs:6px;
}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);
  padding:0;max-width:800px;margin:0 auto;
  background-image:radial-gradient(ellipse at 50% 0%,#0D1520 0%,#0A0C0F 60%)}
.page-header{padding:2.5rem 1.5rem 1.5rem;border-bottom:1px solid var(--border)}
.brand{font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;opacity:.7}
.page-title{font-size:36px;font-weight:900;letter-spacing:-.04em;color:var(--text);margin-bottom:4px;line-height:1}
.page-subtitle{font-size:13px;color:var(--muted);display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:8px}
.page-subtitle a{color:var(--subtle);text-decoration:none;font-weight:500}
.page-subtitle a:hover{color:var(--text)}
.divider{color:var(--border2)}
.rbtn{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);
  font-size:11px;padding:3px 12px;border-radius:20px;cursor:pointer;
  font-family:"Inter",sans-serif;font-weight:500;transition:all .15s}
.rbtn:hover{color:var(--text);border-color:var(--subtle)}
.sb{display:flex;gap:6px;padding:1rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.pill{font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;
  font-family:"JetBrains Mono",monospace;letter-spacing:.06em}
.pill.live{background:#F04D5A12;color:var(--red);border:1px solid #F04D5A25;animation:blink 2s infinite}
.pill.final{background:#8A95A810;color:var(--muted);border:1px solid #8A95A820}
.pill.soon{background:#4B9EF510;color:var(--blue);border:1px solid #4B9EF825}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.slbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);padding:1.25rem 1.5rem 0.6rem;display:flex;align-items:center;gap:12px}
.slbl::after{content:"";flex:1;height:1px;background:var(--border)}
.glist{display:flex;flex-direction:column;gap:6px;padding:0 1rem 2rem}
.gc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;position:relative}
.gc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:transparent}
.gc.hp::before{background:var(--gold)}
.gc.lv::before{background:var(--red)}
.gc.hp{border-color:#F5C84220}
.gc.lv{border-color:#F04D5A18}
.gct{padding:14px 16px 14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s}
.gct:hover{background:var(--surface2)}
.ta{flex:1}.th{flex:1;text-align:right}
.tn{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.spp{font-size:11px;color:var(--muted);margin-top:2px;font-weight:400}
.cc{flex:0 0 120px;text-align:center}
.sc{display:flex;align-items:center;justify-content:center;gap:8px;line-height:1}
.sc-n{font-size:28px;font-weight:900;letter-spacing:-.03em;font-family:"Inter",sans-serif}
.sc-n.dim{color:var(--muted)}
.sc-sep{color:var(--border2);font-size:20px;font-weight:300}
.gi{font-size:10px;font-family:"JetBrains Mono",monospace;margin-top:5px;font-weight:600}
.gi.lv{color:var(--red)}.gi.up{color:var(--blue)}.gi.fn{color:var(--muted)}
.arr{font-size:10px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.gc.op .arr{transform:rotate(180deg)}
.pkb{background:#F5C84208;border-top:1px solid #F5C84215;padding:7px 18px;
  font-size:11px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pkt{font-family:"JetBrains Mono",monospace;font-weight:700;color:var(--gold);
  font-size:9px;letter-spacing:.12em;text-transform:uppercase}
.pkd{color:var(--text);font-weight:600;font-size:12px}
.pkl{color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:11px}
.pku{color:var(--gold);font-family:"JetBrains Mono",monospace;font-weight:700;font-size:11px}
.gcb{display:none;padding:12px 18px 14px}
.gc.op .gcb{display:block}
.lst{width:100%;border-collapse:collapse;font-family:"JetBrains Mono",monospace;font-size:11px}
.lst th{color:var(--muted);text-align:center;padding:4px 3px;
  border-bottom:1px solid var(--border);font-weight:600;min-width:20px;font-size:10px}
.lst th.tn3{text-align:left;min-width:38px}
.lst td{text-align:center;padding:4px 3px}
.lst td.tn3{text-align:left;color:var(--subtle)}
.lst td.ci{background:var(--surface3);color:var(--gold);font-weight:700}
.lst .sep{border-left:1px solid var(--border)}
.lst td.sep{font-weight:700}
.loading{text-align:center;padding:4rem;color:var(--muted);font-size:14px}
footer{font-size:11px;color:var(--muted);margin-top:2rem;text-align:center;
  padding:1.5rem 1.5rem 3rem;border-top:1px solid var(--border);line-height:2;opacity:.6}
@media(max-width:500px){
  .glist{padding:0 0.5rem 2rem}
  .page-title{font-size:28px}
  .cc{flex:0 0 90px}
  .sc-n{font-size:22px}
}
</style>
</head>
<body>
<div class="page-header">
  <div class="brand">MLB Betting Model</div>
  <div class="page-title">Live Scores</div>
  <div class="page-subtitle">
    <span id="dlbl"></span><span class="divider">&middot;</span>
    <a href="index.html">Today's picks</a><span class="divider">&middot;</span>
    <a href="record.html">Record</a><span class="divider">&middot;</span>
    <span id="upd" style="color:var(--muted)">Loading...</span>
    <button class="rbtn" onclick="hardRefresh()">&#8635; Refresh</button>
  </div>
</div>
<div class="sb" id="sb"></div>
<div id="cont"><div class="loading">Loading scores...</div></div>
<footer>Live data from MLB Stats API &middot; Auto-refreshes every 30 seconds</footer>

<script>
var PICKS={};
var ABBR={'New York Yankees':'NYY','New York Mets':'NYM','Boston Red Sox':'BOS','Tampa Bay Rays':'TB','Baltimore Orioles':'BAL','Toronto Blue Jays':'TOR','Chicago White Sox':'CWS','Cleveland Guardians':'CLE','Detroit Tigers':'DET','Kansas City Royals':'KC','Minnesota Twins':'MIN','Houston Astros':'HOU','Los Angeles Angels':'LAA','Oakland Athletics':'OAK','Athletics':'ATH','Seattle Mariners':'SEA','Texas Rangers':'TEX','Atlanta Braves':'ATL','Miami Marlins':'MIA','Philadelphia Phillies':'PHI','Washington Nationals':'WSH','Chicago Cubs':'CHC','Cincinnati Reds':'CIN','Milwaukee Brewers':'MIL','Pittsburgh Pirates':'PIT','St. Louis Cardinals':'STL','Arizona Diamondbacks':'ARI','Colorado Rockies':'COL','Los Angeles Dodgers':'LAD','San Diego Padres':'SD','San Francisco Giants':'SF'};
function ab(n){return ABBR[n]||(n.split(' ').pop().substring(0,3).toUpperCase());}
function toET(iso){try{return new Date(iso).toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'})+' ET';}catch(e){return '';}}
function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/New_York'});}
var initialized=false;
async function loadPicks(){
  try{var r=await fetch('picks.json');if(!r.ok)return;var d=await r.json();
  (d.picks||[]).forEach(p=>{if(p.tier&&p.tier!=='SKIP'&&p.tier!=='WATCH')
    PICKS[p.game]={pick:p.pick.replace(/\(WATCH\)/,'').trim(),tier:p.tier,line:p.line,units:p.units};});}
  catch(e){}
}
function fp(a,h){return PICKS[a+' @ '+h]||PICKS[h+' @ '+a]||null;}
async function tick(){
  try{
    var r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+today()+'&hydrate=linescore,team,probablePitcher');
    var d=await r.json();var games=[];
    (d.dates||[]).forEach(dt=>dt.games.forEach(g=>games.push(g)));
    if(!initialized){buildAll(games);initialized=true;}
    else{games.forEach(g=>patch(g));updateSB(games);}
    document.getElementById('upd').textContent='Updated '+new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit'})+' ET';
  }catch(e){}
}
function hardRefresh(){initialized=false;document.getElementById('cont').innerHTML='<div class="loading">Refreshing...</div>';tick();}
function updateSB(games){
  var lv=0,fn=0,up=0;
  games.forEach(g=>{var s=g.status.abstractGameState;if(s==='Live')lv++;else if(s==='Final')fn++;else up++;});
  var h='';
  if(lv)h+='<span class="pill live">&#9679; '+lv+' Live</span>';
  if(fn)h+='<span class="pill final">'+fn+' Final</span>';
  if(up)h+='<span class="pill soon">'+up+' Upcoming</span>';
  document.getElementById('sb').innerHTML=h;
}
function patch(g){
  var gid=g.gamePk,el=document.getElementById('gc-'+gid);if(!el)return;
  var aS=g.teams.away.score,hS=g.teams.home.score;
  var st=g.status.abstractGameState,ls=g.linescore||{},inn=ls.innings||[];
  var ci=ls.currentInning||0,io=ls.currentInningOrdinal||'',it=ls.isTopInning;
  var isFin=st==='Final',isLiv=st==='Live',hasS=aS!==undefined&&aS!==null;
  var sc=el.querySelector('.sc');
  if(sc&&hasS){
    sc.innerHTML='<span class="sc-n'+(isFin&&aS<hS?' dim':'')+'">'+(aS||0)+'</span>'
      +'<span class="sc-sep">:</span>'
      +'<span class="sc-n'+(isFin&&hS<aS?' dim':'')+'">'+(hS||0)+'</span>';
  }
  var gi=el.querySelector('.gi');
  if(gi){
    if(isLiv){gi.textContent=(it?'▲':'▼')+' '+io;gi.className='gi lv';}
    else if(isFin){gi.textContent='Final'+(inn.length>9?'/'+inn.length:'');gi.className='gi fn';}
  }
  if(isLiv)el.classList.add('lv');
  var lsd=el.querySelector('.ls-dyn');
  if(lsd)lsd.innerHTML=buildLS(inn,g.teams.away.team.name,g.teams.home.team.name,aS,hS,ci,st);
}
function buildAll(games){
  document.getElementById('dlbl').textContent=today();
  var lv=[],fn=[],up=[];
  games.forEach(g=>{var s=g.status.abstractGameState;if(s==='Live')lv.push(g);else if(s==='Final')fn.push(g);else up.push(g);});
  updateSB(games);
  var h='<div class="glist">';
  if(lv.length){h+='<div class="slbl">Live Now</div>';lv.forEach(g=>h+=buildCard(g));}
  if(up.length){h+='<div class="slbl">Upcoming</div>';up.forEach(g=>h+=buildCard(g));}
  if(fn.length){h+='<div class="slbl">Final</div>';fn.forEach(g=>h+=buildCard(g));}
  h+='</div>';
  document.getElementById('cont').innerHTML=h;
}
function buildCard(g){
  var away=g.teams.away.team.name,home=g.teams.home.team.name;
  var aS=g.teams.away.score,hS=g.teams.home.score;
  var st=g.status.abstractGameState,ls=g.linescore||{},inn=ls.innings||[];
  var ci=ls.currentInning||0,io=ls.currentInningOrdinal||'',it=ls.isTopInning;
  var gid=g.gamePk;
  var awP=((g.teams.away.probablePitcher||{}).fullName||'TBD').split(' ').pop();
  var hmP=((g.teams.home.probablePitcher||{}).fullName||'TBD').split(' ').pop();
  var pk=fp(away,home);
  var isLiv=st==='Live',isFin=st==='Final',hasS=aS!==undefined&&aS!==null;
  var si=hasS
    ?'<span class="sc-n'+(isFin&&aS<hS?' dim':'')+'">'+(aS||0)+'</span><span class="sc-sep">:</span><span class="sc-n'+(isFin&&hS<aS?' dim':'')+'">'+(hS||0)+'</span>'
    :'<span style="font-size:13px;color:var(--border2)">vs</span>';
  var gc=isLiv?'gi lv':isFin?'gi fn':'gi up';
  var gt=isLiv?(it?'▲':'▼')+' '+io:isFin?'Final'+(inn.length>9?'/'+inn.length:''):'⏱ '+toET(g.gameDate);
  var pbh=pk
    ?'<div class="pkb"><span class="pkt">'+pk.tier+'</span><span class="pkd">'+pk.pick+'</span><span class="pkl">'+pk.line+'</span><span class="pku">'+pk.units+'u</span></div>'
    :'';
  return '<div class="gc'+(pk?' hp':'')+(isLiv?' lv':'')+'" id="gc-'+gid+'">'
    +'<div class="gct" onclick="toggleCard(\''+gid+'\')">'
    +'<div class="ta"><div class="tn">'+ab(away)+'</div><div class="spp">'+awP+'</div></div>'
    +'<div class="cc"><div class="sc">'+si+'</div><div class="'+gc+'">'+gt+'</div></div>'
    +'<div class="th"><div class="tn">'+ab(home)+'</div><div class="spp">'+hmP+'</div></div>'
    +'<span class="arr">&#9662;</span></div>'
    +pbh
    +'<div class="gcb"><div class="ls-dyn">'+buildLS(inn,away,home,aS,hS,ci,st)+'</div></div>'
    +'</div>';
}
function toggleCard(gid){var gc=document.getElementById('gc-'+gid);if(gc)gc.classList.toggle('op');}
function buildLS(inn,away,home,aT,hT,ci,st){
  if(!inn.length&&st!=='Live'&&st!=='Final')return '<p style="font-size:11px;color:var(--muted);padding:4px 0">Game not started yet</p>';
  var max=Math.max(9,inn.length);
  var hdr='<th class="tn3">Team</th>';
  for(var i=1;i<=max;i++)hdr+='<th'+(i===ci?' class="ci"':'')+'>'+i+'</th>';
  hdr+='<th class="sep">R</th>';
  function row(side,name,total){
    var cells='<td class="tn3">'+ab(name)+'</td>';
    for(var i=1;i<=max;i++){var x=inn[i-1];var v=x&&x[side]!==undefined&&x[side].runs!==undefined?x[side].runs:'';cells+='<td'+(i===ci?' class="ci"':'')+'>'+v+'</td>';}
    cells+='<td class="sep">'+(total!==undefined&&total!==null?total:'')+'</td>';
    return '<tr>'+cells+'</tr>';
  }
  return '<table class="lst"><thead><tr>'+hdr+'</tr></thead><tbody>'+row('away',away,aT)+row('home',home,hT)+'</tbody></table>';
}
async function init(){await loadPicks();await tick();setInterval(tick,30000);}
init();
</script>
</body>
</html>
